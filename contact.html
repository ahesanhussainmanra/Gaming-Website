<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UltraGamingHub | Contact</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body data-page="contact" data-top-title="Contact UltraGamingHub" data-top-subtitle="Support, collaboration and content requests.">
  <main class="page">
    <section class="hero" data-reveal>
      <h2>Reach The Team Safely</h2>
      <p>Use official channels only. Do not share passwords, OTPs, payment PIN or sensitive account data.</p>
    </section>

    <section class="section" data-reveal>
      <div class="contact-grid">
        <article class="card">
          <h3>Official Channels</h3>
          <p>Email: contact@ultragaminghub.com</p>
          <p>Instagram: @ultragaminghub</p>
          <p>Discord: UltraGamingHub Community</p>
          <p>Avg reply window: 24 hours</p>
        </article>

        <article class="card">
          <h3>Send Message</h3>
          <form>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="topic">Topic</label>
            <select id="topic" name="topic">
              <option>Guide Request</option>
              <option>Gear Recommendation</option>
              <option>Community Support</option>
              <option>Partnership Query</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message"></textarea>

            <button type="button">Send Message</button>
          </form>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
